name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=cover.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
          retention-days: 7

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.18.4
      - name: Lint chart
        run: helm lint charts/sr-cache
      - name: Render chart with defaults
        run: |
          helm template smoke charts/sr-cache \
            --set upstream.url=https://example.invalid \
            --set upstream.apiKey=k \
            --set upstream.apiSecret=s \
            > /dev/null

  build-smoke:
    name: docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: sr-cache:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
