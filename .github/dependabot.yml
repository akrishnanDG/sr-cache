version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]
  - package-ecosystem: "gomod"
    directory: "/clients/go"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/clients/python"
    schedule:
      interval: "monthly"
  - package-ecosystem: "maven"
    directory: "/clients/java"
    schedule:
      interval: "monthly"
