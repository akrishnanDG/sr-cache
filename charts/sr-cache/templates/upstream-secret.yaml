{{- /*
Render an UPSTREAM_* Secret IF the user did NOT provide an existingSecret AND
provided inline values. Otherwise the Deployment's envFrom references whatever
they did provide.

If neither is set, render an empty Secret so the deployment doesn't crash —
the user gets a clear "missing UPSTREAM_URL" error at startup.
*/}}
{{- if not .Values.upstream.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-upstream" (include "sr-cache.fullname" .) }}
  labels: {{- include "sr-cache.labels" . | nindent 4 }}
type: Opaque
stringData:
  UPSTREAM_URL: {{ .Values.upstream.url | quote }}
  UPSTREAM_API_KEY: {{ .Values.upstream.apiKey | quote }}
  UPSTREAM_API_SECRET: {{ .Values.upstream.apiSecret | quote }}
{{- end }}
