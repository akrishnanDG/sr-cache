apiVersion: apps/v1
kind: Deployment
metadata:
  name: sr-cache
  labels:
    app: sr-cache
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sr-cache
  template:
    metadata:
      labels:
        app: sr-cache
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Spread replicas across nodes so a single-node failure doesn't take
      # them all out. preferredDuringScheduling so 1-node dev clusters still
      # schedule.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: { app: sr-cache }
                topologyKey: kubernetes.io/hostname
      containers:
        - name: sr-cache
          image: ghcr.io/akrishnandg/sr-cache:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: "valkey:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sr-cache-redis
                  key: password
                  # If you provisioned a managed Valkey/ElastiCache, swap REDIS_ADDR
                  # to its endpoint and put the AUTH token in this Secret instead.
            - name: LISTEN_ADDR
              value: ":8080"
            - name: LATEST_TTL
              value: "30s"
            - name: LIST_TTL
              value: "10s"
          envFrom:
            - secretRef:
                name: sr-cache-upstream
          resources:
            # Requests reflect realistic steady-state usage — under-requesting
            # causes the scheduler to over-pack pods, leading to CFS throttling
            # under load and HPA flapping (utilization is computed against
            # requests, not limits).
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
