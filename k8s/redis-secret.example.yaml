# Example Secret for Valkey/Redis credentials.
# Don't commit real secrets — provision out-of-band:
#
#   kubectl create secret generic sr-cache-redis \
#     --from-literal=password=$(openssl rand -base64 32)
#
# Or, for a Redis ACL with a named user (recommended for prod):
#
#   kubectl create secret generic sr-cache-redis \
#     --from-literal=username=sr-cache \
#     --from-literal=password=$(openssl rand -base64 32)
#
# Wire username + password into the sr-cache Deployment by adding:
#
#   env:
#     - name: REDIS_USERNAME
#       valueFrom:
#         secretKeyRef: { name: sr-cache-redis, key: username }
#     - name: REDIS_PASSWORD
#       valueFrom:
#         secretKeyRef: { name: sr-cache-redis, key: password }
#
# For a managed Valkey/ElastiCache endpoint, the same Secret works — replace
# REDIS_ADDR with the managed endpoint and put the AUTH token in `password`.
apiVersion: v1
kind: Secret
metadata:
  name: sr-cache-redis
type: Opaque
stringData:
  # ACL username — leave empty/unset to use the legacy "default" user.
  username: ""
  password: "REPLACE_ME_WITH_A_REAL_RANDOM_VALUE"
